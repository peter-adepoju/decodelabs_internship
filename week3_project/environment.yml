name: ecommerce_intel
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core scientific stack
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0
  - statsmodels>=0.14.0

  # Visualization
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - plotly>=5.15.0

  # Storage
  - pyarrow>=12.0.0
  - openpyxl>=3.1.0

  # Config
  - pyyaml>=6.0

  # Notebooks
  - jupyter
  - jupyterlab
  - ipykernel
  - nbformat>=5.7.0
  - nbconvert>=7.0.0

  # Testing
  - pytest>=7.4.0
  - pytest-cov>=4.1.0

  # Code quality
  - black>=23.0.0

  - pip:
    - scikit-learn>=1.3.0
    - xgboost>=1.7.6
    - shap>=0.42.0
    - joblib>=1.3.0
    - duckdb>=0.9.0
    - xlsxwriter>=3.1.0
    - streamlit>=1.28.0
    - kaggle>=1.5.16
    - ruff>=0.1.0
