name: fedtb_nigeria
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Scientific stack via conda for best compatibility
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.13
  - pillow>=10.0

  # Jupyter
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - tqdm>=4.66

  # PyTorch — match your CUDA version if using GPU
  # For CPU only: pytorch torchvision cpuonly
  # For CUDA 11.8: pytorch torchvision pytorch-cuda=11.8
  - pytorch>=2.1
  - torchvision>=0.16
  - cpuonly            # Remove this line if you have a GPU

  # Utilities
  - pyyaml>=6.0
  - requests>=2.31

  # Testing
  - pytest>=7.4
  - pytest-cov>=4.1

  - pip:
    # Federated learning
    - flwr>=1.6

    # Differential privacy
    - opacus>=1.4

    # Experiment tracking
    - mlflow>=2.8

    # Visualisation
    - plotly>=5.18
    - kaleido>=0.2

    # Image processing
    - opencv-python-headless>=4.8
    - albumentations>=1.3

    # Statistics
    - statsmodels>=0.14
    - pingouin>=0.5

    # Interpretability
    - grad-cam>=1.4

    # Other
    - python-dotenv>=1.0
    - kaggle>=1.5
    - nbconvert>=7.9
